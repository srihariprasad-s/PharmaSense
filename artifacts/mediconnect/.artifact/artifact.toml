kind = "web"
previewPath = "/"
title = "MediConnect - Doctor Patient Platform"
version = "1.0.0"
id = "artifacts/mediconnect"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24950

[services.development]
run = "pnpm --filter @workspace/mediconnect run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mediconnect", "run", "build" ]
publicDir = "artifacts/mediconnect/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24950"
BASE_PATH = "/"
